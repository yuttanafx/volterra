<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f1c"/>
      <stop offset="100%" stop-color="#123832"/>
    </linearGradient>
    <radialGradient id="heatGlow" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#ff6b4a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff6b4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mercury" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6b4a"/>
      <stop offset="100%" stop-color="#c6f135"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="100%" stop-color="#c6f135"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg1)"/>
  <circle cx="200" cy="165" r="150" fill="url(#heatGlow)"/>

  <!-- globe outline -->
  <g opacity="0.5" stroke="#9cb3aa" stroke-width="1.4" fill="none">
    <circle cx="270" cy="150" r="70"/>
    <ellipse cx="270" cy="150" rx="70" ry="26"/>
    <ellipse cx="270" cy="150" rx="30" ry="70"/>
    <line x1="200" y1="150" x2="340" y2="150"/>
  </g>

  <!-- rising temperature line chart -->
  <polyline points="60,220 110,205 150,215 190,175 230,185 270,130 310,150 350,90"
    fill="none" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#c6f135">
    <circle cx="350" cy="90" r="5"/>
  </g>

  <!-- thermometer -->
  <g transform="translate(48,70)">
    <rect x="10" y="0" width="16" height="120" rx="8" fill="#0a1f1c" stroke="#9cb3aa" stroke-width="2"/>
    <circle cx="18" cy="132" r="22" fill="#0a1f1c" stroke="#9cb3aa" stroke-width="2"/>
    <rect x="14" y="40" width="8" height="86" rx="4" fill="url(#mercury)"/>
    <circle cx="18" cy="132" r="14" fill="url(#mercury)"/>
  </g>

  <text x="200" y="270" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="2" fill="#c6f135" opacity="0.85">+1.5°C / YEAR</text>
</svg>
