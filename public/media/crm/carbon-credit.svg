<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f1c"/>
      <stop offset="100%" stop-color="#163f37"/>
    </linearGradient>
    <radialGradient id="glowD" cx="35%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#c6f135" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c6f135" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bgD)"/>
  <rect width="400" height="200" fill="url(#glowD)"/>

  <!-- leaf -->
  <g transform="translate(140,100)">
    <path d="M0 40 C -40 30, -46 -20, 0 -46 C 46 -20, 40 30, 0 40 Z" fill="none" stroke="#c6f135" stroke-width="3"/>
    <path d="M0 -40 L0 36" stroke="#c6f135" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- chain links -->
  <g transform="translate(230,100)" fill="none" stroke="#6ea8ff" stroke-width="4">
    <rect x="0" y="-16" width="34" height="32" rx="16"/>
    <rect x="26" y="-16" width="34" height="32" rx="16"/>
    <rect x="52" y="-16" width="34" height="32" rx="16"/>
  </g>

  <text x="200" y="168" text-anchor="middle" font-family="monospace" font-size="12" letter-spacing="1.5" fill="#c6f135" opacity="0.75">CARBON · BLOCKCHAIN</text>
</svg>
